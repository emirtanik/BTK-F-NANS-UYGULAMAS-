spring.application.name=finportfolio-backend

# H2 Veritabani
spring.datasource.url=jdbc:h2:file:./data/finportfolio;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:finportfolio-local-2026}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# H2 Console - sadece gelistirme ortaminda aktif edilmeli (PROD=false)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

server.port=8080

# Hatalarda stack trace ve detayli mesaj sizdirilmasin
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.include-exception=false

# JWT - JWT_SECRET env variable zorunludur; asagidaki deger SADECE lokal gelistirme icin
app.jwt.secret=${JWT_SECRET:local-dev-only-secret-change-in-production-must-be-256bit-minimum}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# CORS - WebSocket de bu listeyi kullanir
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# X-Forwarded-For header'i sadece guvenilir bir reverse-proxy arkasinda calistiginizda true yapin
app.security.trust-forwarded-headers=${TRUST_FORWARDED_HEADERS:false}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

logging.level.com.finportfolio=INFO

# Gemini API - GEMINI_API_KEY env variable ile saglanmalidir
app.gemini.api-key=${GEMINI_API_KEY:dummy-key}
app.gemini.model=gemini-2.0-flash-001
app.gemini.base-url=https://generativelanguage.googleapis.com/v1beta

# Demo veri yukleme - production'da false olmali
app.demo.enabled=${DEMO_ENABLED:true}
app.demo.password=${DEMO_PASSWORD:Demo1234}