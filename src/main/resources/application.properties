spring.application.name=finportfolio-backend

# H2 - AUTO_SERVER=TRUE backend + H2 Console ayni anda baglanmasini saglar
spring.datasource.url=jdbc:h2:file:./data/finportfolio;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# H2 Console - gelistirme icin acik (/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# Hata icerigi
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.include-exception=false

# JWT - dev icin sabit; production'da JWT_SECRET env ile degistirin
app.jwt.secret=local-dev-only-secret-change-in-production-must-be-256bit-minimum
# 8 saat (dev rahatligi)
app.jwt.access-token-expiration-ms=28800000
app.jwt.refresh-token-expiration-ms=604800000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174

# Reverse-proxy yoksa false
app.security.trust-forwarded-headers=false

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

logging.level.com.finportfolio=INFO

# Gemini API
app.gemini.api-key=AIzaSyB4jCG6rI-5NdK44R-dlTzBRLk1zfzQmqU
app.gemini.model=gemini-2.0-flash-001
app.gemini.base-url=https://generativelanguage.googleapis.com/v1beta

# Demo veri otomatik yuklenir (demo@finportfolio.com / Demo1234)
app.demo.enabled=true
app.demo.password=Demo1234
