spring.datasource.url=jdbc:h2:mem:finportfolio-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.jwt.secret=local-test-jwt-secret-must-be-at-least-256-bits-long-for-hs512
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000
app.cors.allowed-origins=http://localhost:5173
app.demo.enabled=false
app.gemini.api-key=dummy-key
app.gemini.model=gemini-2.0-flash-001
app.gemini.base-url=https://generativelanguage.googleapis.com/v1beta
app.security.trust-forwarded-headers=false
